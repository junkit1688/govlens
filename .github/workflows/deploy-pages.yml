name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          GITHUB_PAGES: "true"

      - name: Add static route fallbacks
        run: |
          routes=(
            map
            petitions
            voting
            forum
            reports
            state/perlis
            state/kedah
            state/penang
            state/perak
            state/selangor
            state/kuala-lumpur
            state/putrajaya
            state/negeri-sembilan
            state/melaka
            state/johor
            state/pahang
            state/terengganu
            state/kelantan
            state/sabah
            state/labuan
            state/sarawak
          )
          for route in "${routes[@]}"; do
            mkdir -p "dist/public/$route"
            cp dist/public/index.html "dist/public/$route/index.html"
          done
          cp dist/public/index.html dist/public/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
